---
cis_enable_tmp_nodev: true
cis_enable_tmp_nosuid: true
cis_enable_tmp_noexec: true
cis_enable_var_tmp_nodev: true
cis_enable_var_tmp_nosuid: true
cis_enable_var_tmp_noexec: true
cis_enable_dev_shm_nodev: true
cis_enable_dev_shm_nosuid: true
cis_enable_dev_shm_noexec: true
cis_disable_cramfs: true
cis_disable_squashfs: true
cis_disable_udf: true
cis_enable_gpgcheck: true
cis_enable_auto_updates: true
cis_sudo_log_enabled: true
cis_sudo_use_pty: true
cis_install_aide: true
cis_aide_cron_enabled: true
cis_set_bootloader_password: false
cis_bootloader_password_hash: ""
cis_disable_core_dumps: true
cis_enable_aslr: true
cis_disable_ptrace: false
cis_disable_ipv6: false
cis_disable_ip_forwarding: true
cis_disable_packet_redirect: true
cis_enable_reverse_path_filter: true
cis_ignore_icmp_broadcasts: true
cis_disable_source_routing: true
cis_enable_tcp_syncookies: true
cis_enable_martian_logging: true
cis_enable_firewalld: true
cis_enable_auditd: true
cis_enable_rsyslog: true
cis_audit_log_retention_days: 90
cis_ssh_permit_root_login: "prohibit-password"
cis_ssh_max_auth_tries: 4
cis_ssh_client_alive_interval: 300
cis_ssh_client_alive_count_max: 3
cis_ssh_login_grace_time: 60
cis_ssh_permit_empty_passwords: "no"
cis_ssh_permit_user_environment: "no"
cis_ssh_allow_tcp_forwarding: "no"
cis_ssh_x11_forwarding: "no"
cis_ssh_max_sessions: 4
cis_ssh_port: 22
cis_password_min_days: 1
cis_password_max_days: 365
cis_password_warn_days: 7
cis_password_min_length: 14
cis_password_complexity: true
cis_lockout_attempts: 5
cis_lockout_duration: 900
cis_ensure_root_is_only_uid0: true
cis_disable_root_login_console: false
