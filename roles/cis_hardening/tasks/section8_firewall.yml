---
- name: "8.1 | Ensure firewalld is installed"
  dnf:
    name: firewalld
    state: present
  when: cis_enable_firewalld

- name: "8.2 | Ensure firewalld is started and enabled"
  service:
    name: firewalld
    state: started
    enabled: true
  when:
    - cis_enable_firewalld
    - not ansible_check_mode

- name: "8.3 | Ensure SSH is allowed through firewall"
  firewalld:
    service: ssh
    permanent: true
    state: enabled
    immediate: true
  when:
    - cis_enable_firewalld
    - not ansible_check_mode
